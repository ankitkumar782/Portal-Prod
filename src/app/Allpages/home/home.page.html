<ion-header>

  <ion-toolbar class="pro-header">

    <ion-grid>
      <ion-row class="header-row">

        <!-- Menu -->
        <ion-col size="1" class="menu-col">

          <div class="yt-menu-btn" (click)="Menu1()">
            <ion-icon name="menu-outline"></ion-icon>
          </div>

        </ion-col>

        <!-- Logo -->
        <ion-col size-lg="2" class="logo-col">
          <img src="../assets/logo.png" routerLink="/home/fsearch">
        </ion-col>

        <!-- Spacer -->
        <ion-col size="5"></ion-col>

        <!-- Wallet -->
        <ion-col size-lg="2"  size="0"  class="wallet-col">
          <div class="wallet-pill">
            <ion-icon style="color: white;" name="wallet-outline"></ion-icon>
            <span>{{count | currency:'INR'}}</span>
          </div>
        </ion-col>

        <!-- Profile / Logout -->
        <ion-col size="2" class="profile-col">

          <div class="profile-box" (click)="logout()">

            <div class="avatar">
              <ion-icon style="color: white;" name="person"></ion-icon>
            </div>

            <div class="profile-text">
              <small>Account</small>
              <span>Logout</span>
            </div>

            <ion-icon name="log-out-outline"></ion-icon>

          </div>

        </ion-col>

      </ion-row>
    </ion-grid>

  </ion-toolbar>

</ion-header>
<ion-app class="for-app cfont" style="background-color: white;">
  <ion-split-pane contentId="main-content" when="false">
    <ion-menu menuId="mainMenu" contentId="main-content" type="overlay" swipeGesture="false" side="start"
      class="custom-menu">
      <ion-content class="side-Menu">

        <ion-list id="inbox-list" *ngFor="let d of Menu,let i = index" lines="none">
          <ion-item *ngIf="d.active=='true'" (click)="toggleSubMenu(d)" (ionClick)="d.showDetails=!d.showDetails "
            class="side-Menu-Main main-tag line-up" lines="none" style="margin-left: 10;">
            <ion-icon class="Side-Icon" slot="start" name={{d.icon}}></ion-icon>
            <ion-label>{{d.title}}</ion-label>
            <ion-icon name="caret-down-outline" *ngIf="d.showDetails" style="color: #213d77;"></ion-icon>
            <ion-icon name="caret-up-outline" *ngIf="!d.showDetails" style="color: #213d77;"></ion-icon>
          </ion-item>

          <ion-list *ngIf="!d.showDetails" lines="none">
            <ion-item *ngFor="let s_Menu of d.subMenu" [routerLink]="['/','home',s_Menu.url]" lines="none"
              class="sb-menu side-Menu-Main" routerDirection="root" routerLinkActive="active-menu">

              <ion-label> {{s_Menu.title}}</ion-label>

            </ion-item>
          </ion-list>

          <ion-item *ngIf="!d.subMenu" [routerLink]="['/','home',d.url]" (click)="myAccount()"
            class="main-tag line-up side-Menu-Main" routerDirection="forward">
            <ion-icon class="Side-Icon" slot="start" name={{d.icon}}></ion-icon>
            <ion-label>{{d.title}} </ion-label>
          </ion-item>
        </ion-list>

        

      </ion-content>

    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>

</ion-app>
